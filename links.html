<style>
:root {
  --bg: #faf9f6;
  --bg-subtle: #f3f1ea;
  --text: #1a1a1a;
  --text-muted: #6b6760;
  --text-subtle: #a09c95;
  --accent: #a14f2b;
  --accent-subtle: rgba(161, 79, 43, 0.08);
  --border: rgba(26, 26, 26, 0.08);
  --border-hover: rgba(26, 26, 26, 0.16);

  --font-display: 'EB Garamond', 'Iowan Old Style', Georgia, serif;
  --font-body: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
}

:root.dark {
  --bg: #141414;
  --bg-subtle: #1f1f1f;
  --text: #e8e6e1;
  --text-muted: #8c8880;
  --text-subtle: #5c5954;
  --accent: #d97e57;
  --accent-subtle: rgba(217, 126, 87, 0.08);
  --border: rgba(232, 230, 225, 0.08);
  --border-hover: rgba(232, 230, 225, 0.16);
}

@media (prefers-color-scheme: dark) {
  :root:not(.light) {
    --bg: #141414;
    --bg-subtle: #1f1f1f;
    --text: #e8e6e1;
    --text-muted: #8c8880;
    --text-subtle: #5c5954;
    --accent: #d97e57;
    --accent-subtle: rgba(217, 126, 87, 0.08);
    --border: rgba(232, 230, 225, 0.08);
    --border-hover: rgba(232, 230, 225, 0.16);
  }
}

*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  font-size: 17px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background 0.2s ease, color 0.2s ease;
}

body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 80px 24px 40px;
}

.theme-toggle {
  position: fixed;
  top: 24px;
  right: 24px;
  width: 36px;
  height: 36px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.15s ease, transform 0.15s ease;
  color: var(--text-muted);
}

.theme-toggle:hover {
  border-color: var(--text-muted);
  color: var(--text);
  transform: scale(1.05);
}

.theme-toggle svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.75;
}

.theme-toggle .sun { display: none; }
.theme-toggle .moon { display: block; }
:root.dark .theme-toggle .sun { display: block; }
:root.dark .theme-toggle .moon { display: none; }
@media (prefers-color-scheme: dark) {
  :root:not(.light) .theme-toggle .sun { display: block; }
  :root:not(.light) .theme-toggle .moon { display: none; }
}

.container {
  width: 100%;
  max-width: 420px;
  text-align: center;
}

.headshot {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  object-fit: cover;
  background: var(--bg-subtle);
  border: 1px solid var(--border);
  margin: 0 auto 20px;
  display: block;
  animation: fadeUp 0.5s ease backwards;
}

h1 {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 500;
  letter-spacing: -0.01em;
  margin-bottom: 6px;
  animation: fadeUp 0.5s 0.05s ease backwards;
}

.tagline {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 17px;
  color: var(--text-muted);
  margin-bottom: 36px;
  animation: fadeUp 0.5s 0.1s ease backwards;
}

.links {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 32px;
}

.link {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  text-decoration: none;
  font-size: 15px;
  transition: border-color 0.15s ease, transform 0.15s ease, background 0.15s ease;
  animation: fadeUp 0.5s ease backwards;
}

.link:hover {
  border-color: var(--border-hover);
  background: var(--accent-subtle);
  transform: translateY(-1px);
}

/* Stagger */
.link:nth-child(1) { animation-delay: 0.15s; }
.link:nth-child(2) { animation-delay: 0.18s; }
.link:nth-child(3) { animation-delay: 0.21s; }
.link:nth-child(4) { animation-delay: 0.24s; }
.link:nth-child(5) { animation-delay: 0.27s; }
.link:nth-child(6) { animation-delay: 0.30s; }
.link:nth-child(7) { animation-delay: 0.33s; }
.link:nth-child(8) { animation-delay: 0.36s; }
.link:nth-child(9) { animation-delay: 0.39s; }
.link:nth-child(10) { animation-delay: 0.42s; }

.link-icon {
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: var(--text-muted);
  transition: color 0.15s ease;
}

.link:hover .link-icon {
  color: var(--accent);
}

.link-icon svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.75;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.link-icon.filled svg {
  fill: currentColor;
  stroke: none;
}

.link-label {
  flex: 1;
  text-align: left;
  font-weight: 500;
}

.link-sub {
  font-size: 13px;
  color: var(--text-subtle);
  font-variant-numeric: tabular-nums;
}

.divider {
  margin: 24px 0;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--text-subtle);
  display: flex;
  align-items: center;
  gap: 12px;
  animation: fadeUp 0.5s 0.45s ease backwards;
}

.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.back-link {
  display: inline-block;
  font-size: 13px;
  color: var(--text-subtle);
  text-decoration: none;
  padding: 12px;
  transition: color 0.15s ease;
  animation: fadeUp 0.5s 0.5s ease backwards;
}

.back-link:hover {
  color: var(--accent);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

@media (max-width: 480px) {
  body {
    padding: 56px 20px 32px;
  }
  h1 {
    font-size: 28px;
  }
  .link {
    padding: 13px 16px;
  }
  .theme-toggle {
    top: 16px;
    right: 16px;
  }
}
</style>
</head>

<script>
function setTheme(theme) {
  const root = document.documentElement;
  root.classList.remove('dark', 'light');
  if (theme === 'dark' || theme === 'light') {
    root.classList.add(theme);
    localStorage.setItem('theme', theme);
  } else {
    localStorage.removeItem('theme');
  }
}

function toggleTheme() {
  const root = document.documentElement;
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const current = root.classList.contains('dark') ? 'dark'
    : root.classList.contains('light') ? 'light'
    : (prefersDark ? 'dark' : 'light');
  setTheme(current === 'dark' ? 'light' : 'dark');
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved === 'dark' || saved === 'light') {
    document.documentElement.classList.add(saved);
  }
})();
</script>
